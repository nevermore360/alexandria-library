name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ─── Job 1: Code Quality & Tests ────────────────────────────────────────────
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-only-dummy-secret-key-not-used-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: /tmp/test_db.sqlite3
      DJANGO_SETTINGS_MODULE: library_app.settings.development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-django

      - name: Run flake8 (code quality)
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.git,staticfiles,media,.env \
            --ignore=E501,W503

      - name: Run pytest
        run: pytest library/tests.py -v --tb=short

  # ─── Job 2: Build & Push Docker Image ───────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/library-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/library-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SECRET_KEY=build-time-dummy-key-not-used-at-runtime

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/library-nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/library-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Server ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            APP_DIR=~/library-app
            IMAGE_TAG=${{ github.sha }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            echo "==> Navigating to app directory"
            cd $APP_DIR

            echo "==> Pulling latest compose config from git"
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            echo "==> Writing image tag to environment"
            export IMAGE_TAG=$IMAGE_TAG
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

            echo "==> Pulling new images from Docker Hub"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml pull web nginx

            echo "==> Zero-downtime rolling update: scaling web to 2 replicas"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml up -d \
              --no-deps --scale web=2 --no-recreate web

            echo "==> Waiting for new container to become healthy (20s)"
            sleep 20

            echo "==> Running database migrations"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml exec -T web \
              python manage.py migrate --noinput

            echo "==> Collecting static files"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml exec -T web \
              python manage.py collectstatic --noinput

            echo "==> Scaling web back to 1 replica (removes old container)"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml up -d \
              --no-deps --scale web=1 web

            echo "==> Restarting nginx to pick up any config changes"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml up -d --no-deps nginx

            echo "==> Ensuring all services are up"
            IMAGE_TAG=$IMAGE_TAG DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME \
              docker compose -f docker-compose.prod.yml up -d

            echo "==> Pruning unused Docker images"
            docker image prune -f

            echo "==> Deployment complete"
