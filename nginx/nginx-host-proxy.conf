# Host-level nginx reverse proxy config for the library app.
# Place this file at: /etc/nginx/sites-available/library
# Then enable it:  sudo ln -s /etc/nginx/sites-available/library /etc/nginx/sites-enabled/
# Then reload:     sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain or server IP.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;   # e.g. library.example.com or 192.168.1.169

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
